<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Cerberus — live provenance DAG</title>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <style>
    body { margin: 0; background: #0b0f1a; color: #e6e6e6; font: 14px ui-monospace, monospace; }
    #cy { width: 100vw; height: 70vh; }
    #panel { display: flex; gap: 16px; padding: 12px 16px; }
    .leg { padding: 8px 14px; border: 1px solid #333; border-radius: 8px; opacity: .35; }
    .leg.on { opacity: 1; border-color: #e0533d; box-shadow: 0 0 12px #e0533d66; }
    #verdict { margin-left: auto; font-weight: bold; }
    .block { color: #e0533d; }
    .allow { color: #4ad295; }
  </style>
</head>
<body>
  <div id="cy"></div>
  <div id="panel">
    <div class="leg" id="L1">L1 · private data</div>
    <div class="leg" id="L2">L2 · untrusted influence</div>
    <div class="leg" id="L3">L3 · external egress</div>
    <div id="verdict">awaiting events…</div>
  </div>

  <script>
    // Minimal SSE client + Cytoscape DAG. Wire this to /events from dashboard/app.py.
    const cy = cytoscape({
      container: document.getElementById('cy'),
      style: [
        { selector: 'node', style: { 'label': 'data(label)', 'color': '#fff',
          'background-color': '#2b6cb0', 'text-valign': 'center', 'font-size': 10 } },
        { selector: 'node.untrusted', style: { 'background-color': '#b7791f' } },
        { selector: 'node.secret', style: { 'background-color': '#9b2c2c' } },
        { selector: 'edge', style: { 'width': 2, 'line-color': '#555',
          'target-arrow-shape': 'triangle', 'target-arrow-color': '#555',
          'curve-style': 'bezier' } },
        { selector: 'edge.blocked', style: { 'line-color': '#e0533d', 'width': 4,
          'target-arrow-color': '#e0533d' } },
      ],
      layout: { name: 'breadthfirst', directed: true },
    });

    function setLeg(id, on) { document.getElementById(id).classList.toggle('on', on); }

    const es = new EventSource('/events');
    es.onmessage = (m) => {
      const e = JSON.parse(m.data);
      if (e.kind === 'value') {
        cy.add({ data: { id: e.data.ref, label: e.data.value_kind } });
        if (e.data.value_kind === 'untrusted') cy.$('#' + e.data.ref).addClass('untrusted');
        if (e.data.sensitivity >= 2) cy.$('#' + e.data.ref).addClass('secret');
        cy.layout({ name: 'breadthfirst', directed: true }).run();
      }
      if (e.kind === 'trifecta') {
        setLeg('L1', e.data.L1_private_access);
        setLeg('L2', e.data.L2_untrusted_influence);
        setLeg('L3', e.data.L3_egress);
      }
      if (e.kind === 'verdict') {
        const v = document.getElementById('verdict');
        v.textContent = e.data.decision + ' — ' + e.data.reason;
        v.className = e.data.decision === 'BLOCK' ? 'block' : 'allow';
        if (e.data.decision === 'BLOCK') cy.edges().last().addClass('blocked');
      }
    };
  </script>
</body>
</html>
